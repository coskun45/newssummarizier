name: Security Scanning

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    # Run weekly on Monday at 00:00 UTC
    - cron: '0 0 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  codeql-python:
    name: CodeQL Analysis (Python)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python
          queries: security-and-quality
          config: |
            paths:
              - backend
            paths-ignore:
              - backend/**/__pycache__

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:python"

  codeql-javascript:
    name: CodeQL Analysis (JavaScript/TypeScript)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          queries: security-and-quality
          config: |
            paths:
              - frontend/src

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript-typescript"

  trivy-backend:
    name: Trivy Scan (Backend Image)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up dummy .env for build
        run: |
          cat > backend/.env <<EOF
          OPENAI_API_KEY=sk-dummy-for-image-build
          EOF

      - name: Build backend image
        run: docker build -t bulten-backend:ci ./backend

      - name: Run Trivy vulnerability scanner (Table)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: bulten-backend:ci
          format: table
          exit-code: 0
          severity: HIGH,CRITICAL

      - name: Run Trivy vulnerability scanner (SARIF)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: bulten-backend:ci
          format: sarif
          output: trivy-backend-results.sarif
          severity: HIGH,CRITICAL

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-backend-results.sarif
          category: trivy-backend

      - name: Fail on HIGH/CRITICAL vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: bulten-backend:ci
          format: table
          exit-code: 1
          ignore-unfixed: true
          severity: CRITICAL
          # Only fail on CRITICAL that are fixable

  trivy-frontend:
    name: Trivy Scan (Frontend Image)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build frontend image
        run: docker build -t bulten-frontend:ci ./frontend

      - name: Run Trivy vulnerability scanner (Table)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: bulten-frontend:ci
          format: table
          exit-code: 0
          severity: HIGH,CRITICAL

      - name: Run Trivy vulnerability scanner (SARIF)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: bulten-frontend:ci
          format: sarif
          output: trivy-frontend-results.sarif
          severity: HIGH,CRITICAL

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-frontend-results.sarif
          category: trivy-frontend

      - name: Fail on HIGH/CRITICAL vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: bulten-frontend:ci
          format: table
          exit-code: 1
          ignore-unfixed: true
          severity: CRITICAL
          # Only fail on CRITICAL that are fixable

  trivy-filesystem:
    name: Trivy Scan (Filesystem)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs-results.sarif
          severity: HIGH,CRITICAL

      - name: Upload filesystem scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-fs-results.sarif
          category: trivy-filesystem
