name: CI/CD

on:
  push:
    branches: [master, production]
  pull_request:
    branches: [master]

jobs:
  ci-frontend:
    name: Frontend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check & build
        run: npm run build

  ci-backend:
    name: Backend CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install ruff
        run: pip install ruff

      - name: Lint
        run: ruff check backend/app/

  deploy:
    name: Deploy
    needs: [ci-frontend, ci-backend]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /root/newssummarizier
            git fetch origin
            git reset --hard origin/master
            export APP_VERSION=1.0.$(git rev-list --count HEAD)
            echo "Deploying version $APP_VERSION"
            APP_VERSION=$APP_VERSION docker compose build --no-cache
            APP_VERSION=$APP_VERSION docker compose up -d
            docker compose ps
            echo "=== Deployed: $APP_VERSION ==="
