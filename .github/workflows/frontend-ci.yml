name: Frontend CI

on:
  push:
    branches: [master]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    branches: [master]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci.yml'

concurrency:
  group: frontend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend-ci:
    name: Frontend CI
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Type check with TypeScript
        run: npx tsc --noEmit

      - name: Build with Vite
        run: npm run build

      - name: Verify dist folder created
        run: |
          if [ -d "dist" ]; then
            echo "✅ dist/ folder created successfully"
            ls -lah dist/
          else
            echo "❌ ERROR: dist/ folder not found after build!"
            exit 1
          fi

      - name: Check for exposed API keys (PR only)
        if: github.event_name == 'pull_request'
        working-directory: .
        run: |
          # Check frontend files for accidentally committed secrets
          FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | grep '^frontend/' || true)
          if [ -n "$FILES" ]; then
            if echo "$FILES" | xargs grep -l "OPENAI_API_KEY=" 2>/dev/null; then
              echo "❌ ERROR: Found OPENAI_API_KEY= literal in committed files!"
              exit 1
            fi
          fi
          echo "✅ No exposed API keys found"
