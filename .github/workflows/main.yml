name: CI/CD Pipeline

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: cicd-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─────────────────────────────────────────────
  # 1. Backend CI
  # ─────────────────────────────────────────────
  backend-ci:
    name: Backend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff
          pip install -r requirements.txt

      - name: Lint (ruff)
        run: ruff check app/

      - name: Verify FastAPI app structure
        env:
          OPENAI_API_KEY: sk-ci-dummy-key-not-real
        run: python -c "from app.main import app; print('✅ FastAPI app imports successfully')"

      - name: Check for exposed API keys (PR only)
        if: github.event_name == 'pull_request'
        run: |
          FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -v '.env.example' || true)
          if [ -n "$FILES" ]; then
            if echo "$FILES" | xargs grep -l "OPENAI_API_KEY=" 2>/dev/null; then
              echo "❌ ERROR: Found OPENAI_API_KEY= literal in committed files!"
              exit 1
            fi
          fi
          echo "✅ No exposed API keys found"

  # ─────────────────────────────────────────────
  # 2. Frontend CI
  # ─────────────────────────────────────────────
  frontend-ci:
    name: Frontend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (ESLint)
        run: npm run lint

      - name: Type check (TypeScript)
        run: npx tsc --noEmit

      - name: Build (Vite)
        run: npm run build

      - name: Verify dist folder
        run: |
          [ -d "dist" ] && echo "✅ dist/ created" || (echo "❌ dist/ not found!" && exit 1)

  # ─────────────────────────────────────────────
  # 3. Docker Smoke Test
  # ─────────────────────────────────────────────
  docker-smoke-test:
    name: Docker Smoke Test
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci]
    if: github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up dummy environment
        run: |
          mkdir -p backend
          cat > backend/.env <<EOF
          OPENAI_API_KEY=sk-test-key-for-ci-only-not-real
          JWT_SECRET_KEY=ci-test-secret-do-not-use-in-production
          DATABASE_URL=sqlite:////app/data/news_summary.db
          DEBUG=true
          EOF
          echo "::add-mask::sk-test-key-for-ci-only-not-real"

      - name: Build Docker images
        run: docker compose build

      - name: Start services
        run: |
          docker compose up -d
          sleep 10

      - name: Health check
        run: |
          for i in 1 2 3; do
            echo "Attempt $i/3..."
            curl -f -s http://localhost/api/health && echo "✅ Healthy!" && break || sleep 5
            [ $i -eq 3 ] && echo "❌ Health check failed" && exit 1
          done

      - name: Show logs on failure
        if: failure()
        run: docker compose logs

      - name: Cleanup
        if: always()
        run: |
          docker compose down -v
          rm -f backend/.env

  # ─────────────────────────────────────────────
  # 4. Deploy
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: [docker-smoke-test]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            APP_DIR="$HOME/newssummarizier"
            cd "$APP_DIR"
            git pull origin master

            ENV_FILE="$APP_DIR/backend/.env"
            if [ ! -f "$ENV_FILE" ]; then
              cat > "$ENV_FILE" <<EOF
            OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
            DATABASE_URL=sqlite:///./news_summary.db
            CHECKPOINTS_DB=checkpoints.db
            APP_NAME=News Summarizer
            DEBUG=False
            DEFAULT_FEED_URL=https://rss.dw.com/atom/rss-de-all
            FEED_REFRESH_INTERVAL=1800
            SCRAPING_ENABLED=True
            SCRAPING_DELAY=1.0
            MAX_RETRIES=3
            DEFAULT_MODEL=gpt-4o-mini
            DETAILED_MODEL=gpt-4o
            MAX_TOKENS_INPUT=40000
            MAX_TOKENS_OUTPUT_BRIEF=1500
            MAX_TOKENS_OUTPUT_STANDARD=3000
            MAX_TOKENS_OUTPUT_DETAILED=10000
            DAILY_COST_LIMIT=10.0
            MONTHLY_COST_LIMIT=100.0
            CORS_ORIGINS=http://${{ secrets.SSH_HOST }}
            EOF
              echo "[✓] backend/.env oluşturuldu"
            else
              echo "[✓] backend/.env mevcut"
            fi

            DB_FILE="$APP_DIR/backend/news_summary.db"
            [ ! -f "$DB_FILE" ] && touch "$DB_FILE"
            chown 1001:1001 "$DB_FILE" || true

            export JWT_SECRET_KEY="${{ secrets.JWT_SECRET_KEY }}"
            docker compose build --no-cache
            docker compose up -d --remove-orphans
            echo "[✓] Deploy tamamlandı → http://${{ secrets.SSH_HOST }}"
